name: Validate examples

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: read-all

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.ver
          cache: false

      - name: Build binary
        run: make

      - name: Generate dummy TLS certificates
        run: |
          sudo mkdir -p /etc/pint/certs
          sudo chmod 777 /etc/pint/certs
          openssl req -x509 -newkey rsa:2048 -keyout /dev/null -out /etc/pint/certs/ca.pem -days 1 -nodes -subj "/CN=test-ca"
          openssl req -x509 -newkey rsa:2048 -keyout /etc/pint/certs/client.key -out /etc/pint/certs/client.pem -days 1 -nodes -subj "/CN=test-client"

      - name: Verify examples
        env:
          AUTH_KEY: "12345"
          PROMETHEUS_AUTH_TOKEN: "abcdef"
        run: |
          for CFG in docs/examples/* ; do
            echo ">>> $CFG"
            ./pint -c "$CFG" config
          done
